set -s escape-time 0
set -g focus-events on
setw -g mouse on
# set-option -g default-terminal "xterm-256color"
# set-option -g default-terminal "alacritty"
set-window-option -g mode-keys vi
bind -n C-l send-keys 'C-l'
# double press ^a to send ^a to vim for example
bind C-a send-keys 'C-a'
set -g prefix 'C-a'
set -g prefix2 'M-a'
set -g history-limit 10000
# Set status bar options
set -g status-bg black
set -g status-fg white
set -g status-left-length 12
# make window/pane index start with 1
set -g base-index 1
setw -g pane-base-index 1
 # center the status
set -g status-justify 'centre'
set-option -g renumber-windows on
set-option -sg escape-time 10
set-option -g status-position top
set-option -g allow-passthrough on

######################
#### Key Bindings ####
######################
bind q kill-pane
# bind y resize-pane -Z
bind 0 choose-session
# Resize pane shortcuts
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10
#1 hjkl pane traversal
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


# Easier window traversal
bind -n M-p previous-window
bind -n M-n next-window

# double press ^a to send ^a to vim for example
bind C-a send-keys 'C-a'

# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."
# Session tree chooser
bind S choose-tree
bind-key c new-window -c "#{pane_current_path}" -n "wip"
bind-key C new-window -a -c "#{pane_current_path}"
bind-key g new-window -c "#{pane_current_path}" lazygit
# Split windows like Vim
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"
# enable mouse support for switching panes/windows
# copy paste things
# bind-key -n -T copy-mode-vi Enter send-keys -X copy-pipe 'xclip -i -sel p -f | xclip -i -sel c'
# bind-key -n -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe 'xclip -i -sel p -f | xclip -i -sel c'
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# search
bind-key / copy-mode \; send-key ?

# goto prev window
bind -r Tab select-window -l


# Previously used screen-256color which caused white background rendering on text
# because screen-256color lacks proper background color erase (bce) support for
# modern terminals. The terminal-overrides was also scoped only to screen-256color
# so true color never reached Ghostty or WezTerm.
# set-option -g default-terminal "screen-256color"
# set-option -sa terminal-overrides ',screen-256color:RGB'

# tmux-256color is the correct default inside tmux — it has accurate bce support.
# terminal-overrides then advertises RGB true color to each outer terminal by its $TERM.
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ',xterm-ghostty:RGB'
set-option -sa terminal-overrides ',wezterm:RGB'
# extended-keys and extkeys: passes through modern key sequences. 
# Without this, tmux can mangle keys like Tab in apps like Claude Code
# causes an issue in neovim, going into operator mode on startup
# set -s extended-keys on
# set -as terminal-features ",xterm-ghostty:extkeys"

#### Status Bar Theme ####
if-shell "test -e ~/dotfiles/tmux/theme.tmux.conf" "source-file ~/dotfiles/tmux/theme.tmux.conf"

# Plugins
# Install => prefix-r to reload + prefix-I to install, prefix+u to update
# Uninstall => prefix+alt+u to uninstall
set -g @plugin 'catppuccin/tmux#v2.1.3'
# prefix+F for tmux-fzf
TMUX_FZF_MENU_POPUP=1
TMUX_FZF_MENU_POPUP_WIDTH=70%
TMUX_FZF_MENU_POPUP_HEIGHT=70%
TMUX_FZF_LAUNCH_KEY="S"
# prefix+s for tmux-fzf switcher
set -g @plugin 'sainnhe/tmux-fzf'
# prefix+x for tmux-fzf-url
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# set -g @resurrect-save 'S'
# set -g @resurrect-restore 'R'
set -g @resurrect-capture-pane-contents 'on'

# prefix+x to select urls
set -g @fzf-url-bind 'x'
set -g @fzf-url-extra-filter "rg --only-matching '\/Users[\/\.\w]+'"
run '/opt/homebrew/opt/tpm/share/tpm/tpm'

TMUX_FZF_ORDER="session|window|pane"


