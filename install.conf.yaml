# https://github.com/anishathalye/dotbot
# dotbot -c install.conf.yaml
- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    # ~/.config/atuin/config.toml: atuin/config.toml
    ~/.config/tmux/tmux.conf: tmux/tmux.conf
    ~/.config/fish/config.fish: fish/config.fish
    ~/.config/fish/fish_plugins: fish/fish_plugins
    ~/.config/fish/functions: fish/functions
    ~/.config/ghostty/config: ghostty/config
    ~/.gitconfig: git/.gitconfig
    ~/.gitignore: git/.gitignore
    ~/.config/mise/config.toml: mise/config.toml
    ~/.config/nvim: neovim
    ~/.config/nushell/config.nu: nushell/config.nu
    ~/.ripgreprc: ripgrep/.ripgreprc
    ~/.config/starship.toml: starship/starship.toml
    ~/.config/wezterm: wezterm
    ~/.config/aerospace/aerospace.toml: aerospace/aerospace.toml
    ~/.config/sesh: sesh
    ~/.config/television: television
    ~/.config/opencode/opencode.json: opencode/opencode.json
    ~/.config/opencode/tui.json: opencode/tui.json
    ~/.agents: agents
    ~/Code/.editorconfig: .editorconfig
    ~/IdeaProjects/.editorconfig: .editorconfig

- shell:
  - [cp ~/dotfiles/lazygit/config.yml ~/.config/lazygit, Copying lazygit config]
